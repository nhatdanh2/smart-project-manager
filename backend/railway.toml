# Railway project configuration for the FastAPI backend.
# Docs: https://docs.railway.app/reference/config-as-code
#
# We let Railway's Nixpacks builder handle dependency installation
# (it auto-detects requirements.txt).  Railway runs ``build`` once
# at image build time and ``deploy`` on every start/restart.

[build]
builder = "NIXPACKS"

# We use the in-project Dockerfile for full control over the build,
# including the apt-get deps needed by lxml / xmlsec / python3-saml.
# Uncomment the next two lines and comment the NIXPACKS line above
# if you prefer the explicit Docker path.
# builder = "DOCKERFILE"
# dockerfilePath = "backend/Dockerfile"

[deploy]
# Start command: uvicorn against app/main.py
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"

# Health check path (Railway pings this).  Make sure to expose /health
# in the FastAPI app (it already is).
healthcheckPath = "/health"
healthcheckTimeout = 30

# Restart policy: ON_FAILURE retries up to 10 times.
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Number of replicas (free tier = 1).
numReplicas = 1
