name: deploy

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        type: choice
        default: staging
        options:
          - staging
          - production

permissions:
  contents: read
  id-token: write
  packages: read

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment || 'release' }}
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment || 'production' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Configure kubectl
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Decide image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="${{ github.sha }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Deploying tag: $TAG"

      - name: Deploy with Helm
        run: |
          helm upgrade --install smart-pm ./helm/smart-pm \
            --namespace smart-pm --create-namespace \
            --set backend.image.tag=${{ steps.tag.outputs.tag }} \
            --set frontend.image.tag=${{ steps.tag.outputs.tag }} \
            --set backend.secrets.jwtSecretKey="${{ secrets.JWT_SECRET_KEY }}" \
            --set backend.secrets.postgresPassword="${{ secrets.POSTGRES_PASSWORD }}" \
            --set backend.secrets.anthropicApiKey="${{ secrets.ANTHROPIC_API_KEY }}" \
            --set backend.secrets.openaiApiKey="${{ secrets.OPENAI_API_KEY }}" \
            --set backend.secrets.sentryDsn="${{ secrets.SENTRY_DSN }}" \
            --set frontend.secrets.sentryDsn="${{ secrets.SENTRY_DSN }}" \
            --wait --timeout 10m

      - name: Smoke test
        run: |
          sleep 10
          curl -fsSL https://${{ vars.PUBLIC_DOMAIN }}/health || exit 1
