# Default values for smart-pm.
# This is a YAML-formatted file. Override with --set / -f values.yaml.
#
# Example (production):
#   helm upgrade --install smart-pm ./helm/smart-pm \
#     --set backend.image.tag=v0.1.0 \
#     --set backend.secrets.jwtSecretKey=... \
#     --set ingress.hosts[0].host=spm.example.com

# -----------------------------------------------------------------------------
# Global
# -----------------------------------------------------------------------------
nameOverride: ""
fullnameOverride: ""

image:
  registry: ghcr.io
  pullPolicy: IfNotPresent

imagePullSecrets: []

# When true, deploys the bundled Postgres StatefulSet + Redis Deployment.
# Set to false in production where you use a managed DB/cache instead.
bundledDatabase: true
bundledRedis: true

# -----------------------------------------------------------------------------
# Backend (FastAPI)
# -----------------------------------------------------------------------------
backend:
  enabled: true
  replicaCount: 2
  image:
    repository: your-org/spm-backend
    tag: latest
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1
      memory: 1Gi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
  service:
    type: ClusterIP
    port: 8000
  # All "secrets" are injected as env vars; values are stored
  # in a Kubernetes Secret generated by the chart.
  secrets:
    jwtSecretKey: ""
    postgresPassword: ""
    anthropicApiKey: ""
    openaiApiKey: ""
    sentryDsn: ""
  env:
    apiPrefix: "/api"
    useCelery: "true"
    corsOrigins: "https://spm.example.com"
    rateLimitEnabled: "true"
    rateLimitDefault: "120/minute"
    rateLimitAi: "10/minute"
    rateLimitUpload: "20/minute"
    rateLimitAuth: "10/minute"
    sentryEnv: "production"
    sentryTracesSampleRate: "0.2"
    otelServiceName: "smart-pm-backend"
    otelExporterOtlpEndpoint: ""
  persistence:
    enabled: true
    size: 20Gi
    storageClass: ""  # use cluster default
  initMigrate: true  # run `alembic upgrade head` before starting the API
  probes:
    readinessPath: /health
    livenessPath: /health

# -----------------------------------------------------------------------------
# Celery worker
# -----------------------------------------------------------------------------
celery:
  enabled: true
  replicaCount: 2
  image:
    repository: your-org/spm-backend
    tag: latest
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1
      memory: 1Gi
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 75

# -----------------------------------------------------------------------------
# Frontend (Next.js)
# -----------------------------------------------------------------------------
frontend:
  enabled: true
  replicaCount: 2
  image:
    repository: your-org/spm-frontend
    tag: latest
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 80
  service:
    type: ClusterIP
    port: 80
    targetPort: 3000
  env:
    publicApiUrl: "https://spm.example.com"
    publicWsUrl: "wss://spm.example.com"
  secrets:
    sentryDsn: ""
    nextauthSecret: ""

# -----------------------------------------------------------------------------
# Postgres (only used when bundledDatabase: true)
# -----------------------------------------------------------------------------
postgres:
  enabled: true
  image:
    repository: postgres
    tag: 16-alpine
  auth:
    database: spm
    username: spm
  persistence:
    size: 10Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1
      memory: 1Gi

# -----------------------------------------------------------------------------
# Redis (only used when bundledRedis: true)
# -----------------------------------------------------------------------------
redis:
  enabled: true
  image:
    repository: redis
    tag: 7-alpine
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

# -----------------------------------------------------------------------------
# Ingress
# -----------------------------------------------------------------------------
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: spm.example.com
      paths:
        - path: /api
          service: backend
        - path: /ws
          service: backend
        - path: /
          service: frontend
  tls:
    - hosts:
        - spm.example.com
      secretName: spm-tls

# -----------------------------------------------------------------------------
# Service account / RBAC
# -----------------------------------------------------------------------------
serviceAccount:
  create: true
  name: ""

# -----------------------------------------------------------------------------
# Network policies
# -----------------------------------------------------------------------------
networkPolicy:
  enabled: true
