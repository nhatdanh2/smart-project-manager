# Smart Student Project Manager — local development stack.
#
# Usage:
#   docker compose up --build              # API + DB + Redis + frontend (dev)
#   docker compose --profile celery up     # also start Celery worker
#   docker compose down -v                 # stop + remove volumes
#
# Switch DATABASE_URL in backend/celery to SQLite for fully-offline dev
# (no Postgres required); just set USE_CELERY=false in the env below.

services:
  postgres:
    image: postgres:16-alpine
    container_name: spm-postgres
    environment:
      POSTGRES_DB: smart_project_db
      POSTGRES_USER: spm
      POSTGRES_PASSWORD: spm
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spm -d smart_project_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: spm-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # Meilisearch (Phase 10) — opt-in profile so the dev stack stays
  # minimal by default.  Run with:
  #   docker compose --profile search up
  meilisearch:
    image: getmeili/meilisearch:v1.10
    container_name: spm-meilisearch
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_MASTER_KEY:-masterKey-dev-only}
      MEILI_ENV: development
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data
    healthcheck:
      test: ["CMD", "wget", "-qO/dev/null", "http://localhost:7700/health"]
      interval: 5s
      timeout: 3s
      retries: 10
    profiles: ["search"]
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: spm-backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
      - backend_uploads:/app/uploads
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://spm:spm@postgres:5432/smart_project_db
      REDIS_URL: redis://redis:6379/0
      USE_CELERY: "false"
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret-change-me}
      JWT_ALGORITHM: HS256
      CORS_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      RATE_LIMIT_ENABLED: "true"
      SENTRY_DSN: ${SENTRY_DSN:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      MEILISEARCH_URL: ${MEILISEARCH_URL:-http://meilisearch:7700}
      MEILISEARCH_MASTER_KEY: ${MEILISEARCH_MASTER_KEY:-masterKey-dev-only}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  celery_worker:
    build: ./backend
    container_name: spm-celery
    command: celery -A app.workers.celery_app worker --loglevel=info
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql+psycopg2://spm:spm@postgres:5432/smart_project_db
      REDIS_URL: redis://redis:6379/0
      USE_CELERY: "true"
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret-change-me}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles: ["celery"]   # opt-in: docker compose --profile celery up
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: spm-frontend
    command: npm run dev
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
      NEXTAUTH_URL: http://localhost:3000
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
  backend_uploads:
  frontend_node_modules:
  meili_data:
